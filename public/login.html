<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LimitGuard - تسجيل الدخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a87f5;
            --accent: #00d4aa;
            --danger: #ff4757;
            --bg-dark: #0a0a0b;
            --bg-card: #111113;
            --border: #2a2a2d;
            --text: #ffffff;
            --text-secondary: #8a8a8a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .bg-pattern {
            position: fixed;
            inset: 0;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(26, 135, 245, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(0, 212, 170, 0.05) 0%, transparent 40%);
            pointer-events: none;
        }
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 10;
        }
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 20px 20px 0 0;
        }
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
        }
        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-icon svg { width: 26px; height: 26px; color: white; }
        .logo-text h1 { font-size: 20px; font-weight: 800; }
        .logo-text p { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; }
        
        .login-title { text-align: center; margin-bottom: 24px; }
        .login-title h2 { font-size: 20px; margin-bottom: 6px; }
        .login-title p { color: var(--text-secondary); font-size: 13px; }
        
        .social-btns { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-dark);
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .social-btn:hover { border-color: var(--primary); }
        .social-btn.google { background: #4285f4; border: none; color: white; }
        .social-btn.discord { background: #5865F2; border: none; color: white; }
        
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        .divider span { font-size: 12px; color: var(--text-secondary); }
        
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
        .input {
            width: 100%;
            padding: 14px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            font-size: 14px;
        }
        .input:focus { outline: none; border-color: var(--primary); }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), #146fe1);
            border: none;
            border-radius: 10px;
            color: white;
            font-family: 'Cairo', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        
        .error {
            background: rgba(255, 71, 87, 0.1);
            border: 1px solid rgba(255, 71, 87, 0.3);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
            color: var(--danger);
            font-size: 13px;
            display: none;
        }
        .error.show { display: block; }
        
        .footer { text-align: center; margin-top: 24px; font-size: 13px; color: var(--text-secondary); }
        .footer a { color: var(--primary); text-decoration: none; }
        
        .tabs {
            display: flex;
            gap: 4px;
            background: var(--bg-dark);
            padding: 4px;
            border-radius: 10px;
            margin-bottom: 24px;
        }
        .tab {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        .tab.active { background: var(--primary); color: white; }
        
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    
    <div class="login-card">
        <div class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
            </div>
            <div class="logo-text">
                <h1>LimitGuard</h1>
                <p>SaaS Platform</p>
            </div>
        </div>
        
        <div class="login-title">
            <h2>مرحباً بك</h2>
            <p>سجل دخولك للوصول إلى لوحة التحكم</p>
        </div>
        
        <div class="error" id="error"></div>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">تسجيل دخول</button>
            <button class="tab" onclick="switchTab('register')">حساب جديد</button>
        </div>
        
        <!-- Login Form -->
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="social-btns">
                <button type="button" class="social-btn google" onclick="googleLogin()">
                    <svg width="20" height="20" viewBox="0 0 24 24">
                        <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    المتابعة مع Google
                </button>
            </div>
            
            <div class="divider">
                <span>أو</span>
            </div>
            
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" class="input" id="loginEmail" placeholder="email@example.com" required>
            </div>
            
            <div class="form-group">
                <label>كلمة المرور</label>
                <input type="password" class="input" id="loginPassword" placeholder="********" required>
            </div>
            
            <button type="submit" class="btn">تسجيل الدخول</button>
        </form>
        
        <!-- Register Form -->
        <form id="registerForm" class="hidden" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label>الاسم الكامل</label>
                <input type="text" class="input" id="regName" placeholder="اسمك" required>
            </div>
            
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" class="input" id="regEmail" placeholder="email@example.com" required>
            </div>
            
            <div class="form-group">
                <label>كلمة المرور</label>
                <input type="password" class="input" id="regPassword" placeholder="6 أحرف على الأقل" required minlength="6">
            </div>
            
            <button type="submit" class="btn">إنشاء حساب</button>
        </form>
        
        <div class="footer">
            <p>بال تسجيلك، أنت توافق على <a href="#">شروط الخدمة</a></p>
        </div>
    </div>

    <script>
        const API = '';
        const TOKEN_KEY = 'lg_token';
        const USER_KEY = 'lg_user';
        
        // Check if already logged in
        if (localStorage.getItem(TOKEN_KEY)) {
            window.location.replace('index.html');
        }
        
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
            document.getElementById('registerForm').classList.toggle('hidden', tab !== 'register');
        }
        
        async function handleLogin(e) {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                const res = await fetch(API + '/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    localStorage.setItem(TOKEN_KEY, data.token);
                    localStorage.setItem(USER_KEY, JSON.stringify(data.user));
                    window.location.replace('index.html');
                } else {
                    showError(data.message);
                }
            } catch (err) {
                showError('خطأ في الاتصال');
            }
        }
        
        async function handleRegister(e) {
            e.preventDefault();
            
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            
            try {
                const res = await fetch(API + '/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    localStorage.setItem(TOKEN_KEY, data.token);
                    localStorage.setItem(USER_KEY, JSON.stringify(data.user));
                    window.location.replace('index.html');
                } else {
                    showError(data.message);
                }
            } catch (err) {
                showError('خطأ في الاتصال');
            }
        }
        
        function googleLogin() {
            // Simulated Google Login
            // In production, use Google OAuth
            const email = prompt('أدخل بريدك الإلكتروني:');
            if (!email) return;
            
            const name = email.split('@')[0];
            
            fetch(API + '/api/auth/google', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    email, 
                    name,
                    googleId: 'google_' + Date.now()
                })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    localStorage.setItem(TOKEN_KEY, data.token);
                    localStorage.setItem(USER_KEY, JSON.stringify(data.user));
                    window.location.replace('index.html');
                } else {
                    showError(data.message);
                }
            });
        }
        
        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 5000);
        }
    </script>
</body>
</html>
