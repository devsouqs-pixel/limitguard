<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LimitGuard - تسجيل الدخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a87f5;
            --accent: #00d4aa;
            --danger: #ff4757;
            --bg-dark: #0a0a0b;
            --bg-card: #111113;
            --border-color: #2a2a2d;
            --text-primary: #ffffff;
            --text-secondary: #8a8a8a;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            position: relative;
            overflow: hidden;
        }
        
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
        }
        
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
        }
        
        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .logo-icon svg {
            width: 26px;
            height: 26px;
            color: white;
        }
        
        .logo-text h1 {
            font-size: 22px;
            font-weight: 800;
        }
        
        .logo-text p {
            font-size: 10px;
            color: var(--text-secondary);
            text-transform: uppercase;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
        }
        
        input {
            width: 100%;
            background: var(--bg-dark);
            border: 2px solid var(--border-color);
            border-radius: 10px;
            padding: 14px;
            color: var(--text-primary);
            font-family: 'Cairo', sans-serif;
            font-size: 14px;
        }
        
        input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), #146fe1);
            border: none;
            border-radius: 10px;
            color: white;
            font-family: 'Cairo', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .error {
            background: rgba(255, 71, 87, 0.1);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
            color: var(--danger);
            display: none;
        }
        
        .security {
            text-align: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            font-size: 12px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
            </div>
            <div class="logo-text">
                <h1>LimitGuard</h1>
                <p>Panel v2.0</p>
            </div>
        </div>
        
        <div class="error" id="error"></div>
        
        <form onsubmit="login(event)">
            <div class="form-group">
                <label>اسم المستخدم</label>
                <input type="text" id="username" placeholder="admin" required>
            </div>
            
            <div class="form-group">
                <label>كلمة المرور</label>
                <input type="password" id="password" placeholder="admin123" required>
            </div>
            
            <button type="submit" class="btn">تسجيل الدخول</button>
        </form>
        
        <div class="security">
            محمي بتشفير SSL
        </div>
    </div>

    <script>
        const SESSION_KEY = 'limitguard_session';
        
        // Check if already logged in
        if (localStorage.getItem(SESSION_KEY)) {
            window.location.replace('index.html');
        }
        
        function login(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const error = document.getElementById('error');
            
            // Simple auth (change these!)
            if (username === 'admin' && password === 'admin123') {
                localStorage.setItem(SESSION_KEY, JSON.stringify({
                    user: username,
                    time: Date.now()
                }));
                window.location.replace('index.html');
            } else {
                error.textContent = 'بيانات الدخول غير صحيحة';
                error.style.display = 'block';
            }
        }
    </script>
</body>
</html>
