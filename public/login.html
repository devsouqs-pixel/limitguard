<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LimitGuard - تسجيل الدخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a87f5;
            --accent: #00d4aa;
            --danger: #ff4757;
            --bg-dark: #0a0a0b;
            --bg-card: #111113;
            --border: #2a2a2d;
            --text: #ffffff;
            --text-secondary: #8a8a8a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            position: relative;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 20px 20px 0 0;
        }
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
        }
        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-icon svg { width: 24px; height: 24px; color: white; }
        .logo-text h1 { font-size: 20px; font-weight: 800; }
        .logo-text p { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
        input {
            width: 100%;
            background: var(--bg-dark);
            border: 2px solid var(--border);
            border-radius: 10px;
            padding: 14px;
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            font-size: 14px;
        }
        input:focus { outline: none; border-color: var(--primary); }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), #146fe1);
            border: none;
            border-radius: 10px;
            color: white;
            font-family: 'Cairo', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .error {
            background: rgba(255, 71, 87, 0.1);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
            color: var(--danger);
            display: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
            </div>
            <div class="logo-text">
                <h1>LimitGuard</h1>
                <p>Panel v2.0</p>
            </div>
        </div>
        
        <div class="error" id="error"></div>
        
        <form onsubmit="login(event)">
            <div class="form-group">
                <label>اسم المستخدم</label>
                <input type="text" id="username" placeholder="admin" required>
            </div>
            <div class="form-group">
                <label>كلمة المرور</label>
                <input type="password" id="password" placeholder="admin123" required>
            </div>
            <button type="submit" class="btn">تسجيل الدخول</button>
        </form>
    </div>

    <script>
        if (localStorage.getItem('lg_session')) {
            window.location.replace('index.html');
        }
        
        function login(e) {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const err = document.getElementById('error');
            
            if (u === 'admin' && p === 'admin123') {
                localStorage.setItem('lg_session', JSON.stringify({ user: u }));
                window.location.replace('index.html');
            } else {
                err.textContent = 'بيانات الدخول غير صحيحة';
                err.style.display = 'block';
            }
        }
    </script>
</body>
</html>
